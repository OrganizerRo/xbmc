# Build Kodi for Windows using GitHub Actions
# Based on the AppVeyor configuration, adapted for GitHub-hosted runners

name: Build Kodi (Windows)

on:
  push:
    branches: [main, master, Krypton]
  pull_request:
    branches: [main, master, Krypton]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120
   
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      # MSYS2 is pre-installed on windows-2022 at C:\msys64 (no third-party action needed)
      - name: Bootstrap wget for DownloadBuildDeps
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path project\BuildDependencies\bin | Out-Null
          Copy-Item C:\msys64\usr\bin\wget.exe project\BuildDependencies\bin\
          echo "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\msys64\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          # Verify the path update (optional)
          Write-Host "Updated PATH: $env:PATH"
      - name: Create MSYS2 junction
        shell: cmd
        run: |
          if not exist project\BuildDependencies\msys64 mklink /j project\BuildDependencies\msys64 C:\msys64

      - name: Download build dependencies
        shell: cmd
        run: |
          cd project\BuildDependencies
          call DownloadBuildDeps.bat
        env:
          KODI_MIRROR: http://mirrors.kodi.tv

      # FFmpeg 3.1 with libpostproc: MSYS2's current FFmpeg (4.x+) removed libpostproc.
      # Use ENABLE_INTERNAL_FFMPEG=ON to build FFmpeg 3.1 from Kodi's fork.
      - name: Install MinGW libdvd libraries (libdvdcss, libdvdnav, libdvdread)
        shell: cmd
        run: C:\msys64\usr\bin\bash.exe -l -c "pacman -S --noconfirm mingw-w64-i686-libdvdcss mingw-w64-i686-libdvdnav mingw-w64-i686-libdvdread"

      - name: Prepare MinGW libdvd libs for MSVC
        shell: pwsh
        run: |
          $msysMingw = "C:\msys64\mingw32"
          if (-not (Test-Path $msysMingw)) { throw "MSYS2 mingw32 not found at $msysMingw" }
          New-Item -ItemType Directory -Force -Path project\BuildDependencies\lib | Out-Null
          New-Item -ItemType Directory -Force -Path system | Out-Null
          Get-ChildItem "$msysMingw\lib\lib*.dll.a" -ErrorAction SilentlyContinue | Where-Object { $_.Name -match 'dvd|dvdcss' } | ForEach-Object {
            $newName = $_.Name.Substring(3) -replace '\.dll\.a$', '.lib'
            Copy-Item $_.FullName (Join-Path "project\BuildDependencies\lib" $newName) -Force
          }
          Copy-Item "$msysMingw\include\*" "project\BuildDependencies\include\" -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem "$msysMingw\bin\*.dll" -ErrorAction SilentlyContinue | Where-Object { $_.Name -match 'dvd|dvdcss' } | Copy-Item -Destination "system\" -Force

      - name: Install SWIG
        shell: pwsh
        run: choco install swig -y

      - name: Configure CMake
        shell: cmd
        env:
          KODI_MIRROR: http://mirrors.kodi.tv
        run: |
          if not exist kodi-build mkdir kodi-build
          cd kodi-build
          cmake -G "Visual Studio 17 2022" -A Win32 -DENABLE_INTERNAL_FFMPEG=ON -DKODI_MIRROR=http://mirrors.kodi.tv ..\project\cmake

      - name: Build Kodi
        shell: cmd
        run: |
          cd kodi-build
          cmake --build . --config Release --target all_build

      - name: Upload Kodi build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kodi-Windows-x86
          path: |
            kodi-build/Release/
            system/
