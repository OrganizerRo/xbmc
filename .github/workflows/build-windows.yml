# Build Kodi for Windows using GitHub Actions
# Based on the AppVeyor configuration, adapted for GitHub-hosted runners

name: Build Kodi (Windows)

on:
  push:
    branches: [main, master, Krypton]
  pull_request:
    branches: [main, master, Krypton]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # MSYS2 is pre-installed on windows-2022 at C:msys64 (no third-party action needed)
      - name: Bootstrap wget for DownloadBuildDeps
        shell: pwsh
        run: &#124;
          New-Item -ItemType Directory -Force -Path projectBuildDependenciesbin &#124; Out-Null
          Copy-Item C:msys64usrbinwget.exe projectBuildDependenciesbin

      - name: Create MSYS2 junction
        shell: cmd
        run: &#124;
          if not exist projectBuildDependenciesmsys64 mklink /j projectBuildDependenciesmsys64 C:msys64

      - name: Download build dependencies
        shell: cmd
        run: &#124;
          cd projectBuildDependencies
          call DownloadBuildDeps.bat
        env:
          KODI_MIRROR: http://mirrors.kodi.tv

      - name: Install precompiled MinGW libraries
        shell: cmd
        run: C:msys64usrbinbash.exe -l -c "pacman -S --noconfirm mingw-w64-i686-ffmpeg mingw-w64-i686-libdvdcss mingw-w64-i686-libdvdnav mingw-w64-i686-libdvdread"

      - name: Prepare MinGW libs for MSVC
        shell: pwsh
        run: &#124;
          $msysMingw = "C:msys64mingw32"
          if (-not (Test-Path $msysMingw)) { throw "MSYS2 mingw32 not found at $msysMingw" }
          New-Item -ItemType Directory -Force -Path projectBuildDependencieslib &#124; Out-Null
          New-Item -ItemType Directory -Force -Path system &#124; Out-Null
          Get-ChildItem "$msysMingwliblib*.dll.a" -ErrorAction SilentlyContinue &#124; ForEach-Object {
            $newName = $_.Name.Substring(3) -replace '.dll.a$', '.lib'
            Copy-Item $_.FullName (Join-Path "projectBuildDependencieslib" $newName) -Force
          }
          Copy-Item "$msysMingwlib*.a" "projectBuildDependencieslib" -Force -ErrorAction SilentlyContinue
          Copy-Item "$msysMingwinclude*" "projectBuildDependenciesinclude" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item "$msysMingwbin*.dll" "system" -Force -ErrorAction SilentlyContinue

      - name: Configure CMake
        shell: cmd
        run: &#124;
          if not exist kodi-build mkdir kodi-build
          cd kodi-build
          cmake -G "Visual Studio 17 2022" -A Win32 ..projectcmake

      - name: Build Kodi
        shell: cmd
        run: &#124;
          cd kodi-build
          cmake --build . --config Release --target all_build

      - name: Upload Kodi build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kodi-Windows-x86
          path: &#124;
            kodi-build/Release/
            system/
